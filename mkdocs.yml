# mkdocs.yml
# Configuration for MkDocs 1.6.1
# Полный курс Python / Complete Python Course

# ============================================================================
# ОБЩАЯ ИНФОРМАЦИЯ / GENERAL INFORMATION
# ============================================================================

site_name: 🐍 Полный курс Python
#site_url: https://python-complete-course.github.io/
site_description: Полный курс Python от основ до профессиональных областей
site_author: OIITuMuCT
copyright: © 2026 - Полный курс Python / Complete Python Course

# ============================================================================
# НАСТРОЙКА РЕПОЗИТОРИЯ / REPOSITORY SETTINGS
# ============================================================================

repo_name: python-complete-course
repo_url: https://github.com/python-complete-course/python-complete-course
edit_uri: edit/main/docs/

# ============================================================================
# ПУТИ / PATHS
# ============================================================================

docs_dir: docs
site_dir: site

# ============================================================================
# ТЕМА ОФОРМЛЕНИЯ / THEME
# ============================================================================

theme:
  name: material
  #  name: readthedocs
  language: ru

  palette:
    - scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Переключить на темную тему
    - scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Переключить на светлую тему

  font:
    text: Roboto
    code: JetBrains Mono

  icon:
    logo: material/library
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.integrate
    - search.suggest
    - search.highlight
    - search.share
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - announce.dismiss
    - header.autohide

# ============================================================================
# ПЛАГИНЫ / PLUGINS
# ============================================================================

plugins:
  - search:
      lang:
        - ru
        - en
      separator: '[\s\-\.]+'

  - minify:
      minify_html: true
      minify_js: true
      minify_css: true

# ============================================================================
# МАРКДАУН РАСШИРЕНИЯ / MARKDOWN EXTENSIONS
# ============================================================================

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - meta
  - toc:
      permalink: true
      toc_depth: 6

  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

